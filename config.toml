[openai]
endpoint = "http://kuro.local:8081/v1"

[system_prompt]
text = "日本語で応答せよ。返答にサマリー的文言は不要である。内容だけ提示せよ。要約せず正確に行え。"
lines = "応答は %d 行ほど生成せよ。"

[prompts]
choices = [
    "画像を簡素に説明せよ。",
    "画像を至極詳細に説明せよ。",
    "レイアウト、ボタン配置、ＵＩエレメント等を中心に、至極詳細に説明せよ。",
    "画像中のテキストを全て抽出せよ。",
    "画像を至極詳細に説明せよ。# 概要 / # レイアウト、ボタン配置、ＵＩエレメント等 / # 画像中のテキスト"
]

planned_lines = [15, 30, 60, 120]
