[openai]
endpoint = "http://kuro.local:8080/v1"
model = "gemma4"

[system_prompt]
text = """
高度画像解析エキスパートとして振る舞え。以下の指示を完遂せよ。

1. **言語**: 必ず日本語で応答せよ。
2. **構成**: 「以上の通りです」「画像の内容を説明します」等のサマリー的文言、導入文、結びの言葉は一切排除せよ。解析結果のみを直接提示すること。
3. **精度**: 画像内の情報を要約せず、微細な点に至るまで正確に記述せよ。
4. **解析対象**:
   - 背景、前景、オブジェクトの配置、色、形状の詳細。
   - 画像内に含まれる全てのテキスト、数値、記号の正確な書き出し。
   - グラフや図解の場合は、その構造とデータの詳細。

視覚情報を一滴も漏らさず、**事実のみ** を記述せよ。
"""

lines = " **全体で %d 行程度** のボリュームで記述せよ。"

[prompts]
choices = [
    "画像の内容を簡素に説明せよ。",
    "画像の内容を詳細に説明せよ。",
    "レイアウト、ボタン配置、UIエレメント等を中心に詳細に記述せよ。",
    "画像内にある全てのテキストを漏らさず抽出せよ。",
    "画像の内容をアスキーアートで表現せよ。"
]

planned_lines = [10, 20, 50]

[app_info]
model_name = "unsloth/gemma-4-26B-A4B-it-GGUF"
model_url = "https://huggingface.co/unsloth/gemma-4-26B-A4B-it-GGUF"
