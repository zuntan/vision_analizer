<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vision_analizer</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: {
                            50: '#f8fafc',
                            100: '#f1f5f9',
                            200: '#e2e8f0',
                            300: '#cbd5e1',
                            400: '#94a3b8',
                            500: '#64748b',
                            600: '#475569',
                            700: '#334155',
                            800: '#1e293b',
                            900: '#0f172a',
                        }
                    }
                }
            },
            darkMode: 'class',
        }
    </script>
</head>
<body class="bg-dark-900 text-dark-50 min-h-screen">
    <!-- Global wait overlay -->
    <div id="global-wait-overlay" class="fixed inset-0 bg-dark-900 bg-opacity-80 flex items-center justify-center z-50 hidden">
        <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-b-4 border-blue-400"></div>
    </div>

    <div class="container mx-auto px-2 py-1">
        <h1 class="text-3xl font-bold text-center mb-2">Vision Analizer</h1>

        <!-- Drag and Drop Area -->
        <div id="drop-area" class="border-2 border-dashed border-dark-400 rounded-lg p-2 text-center mb-2 cursor-pointer bg-dark-800 shadow-sm transition-colors hover:bg-dark-700">
            <div class="flex flex-col items-center justify-center space-y-1">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-dark-300">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                <p class="text-dark-300">ここに画像ファイルをドラッグ＆ドロップするか、クリップボードからペーストしてください</p>
                <p class="text-xs text-dark-500">サポート形式: JPEG, PNG, BMP, WEBP</p>
            </div>
        </div>

        <!-- Hidden file input for drag & drop area click -->
        <input type="file" id="file-input" accept=".jpg,.jpeg,.png,.bmp,.webp" class="hidden">

        <!-- Analysis Area -->
        <div id="analysis-area" class="bg-dark-800 rounded-lg shadow-md p-4 mb-2 hidden relative">
            <!-- Wait overlay -->
            <div id="wait-overlay" class="absolute inset-0 bg-dark-900 bg-opacity-80 flex items-center justify-center z-10 hidden">
                <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-b-4 border-blue-400"></div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <!-- Preview Image -->
                <div class="md:col-span-1">
                    <label class="block text-sm font-medium text-dark-300 mb-2">プレビュー</label>
                    <div id="preview-container" class="border border-dark-600 rounded-md overflow-hidden bg-dark-700 flex items-center justify-center h-32 w-48 cursor-pointer">
                        <img id="preview-image" src="" alt="Preview" class="max-h-full max-w-full object-contain hidden">
                        <span id="no-preview-text" class="text-dark-500">画像が選択されていません</span>
                    </div>
                </div>

                <!-- Prompt Input and Result Text -->
                <div class="md:col-span-3">
                    <div class="grid grid-cols-1 gap-1">
                        <!-- Prompt Input -->
                        <div>
                            <label for="prompt-select" class="block text-sm font-medium text-dark-300">プロンプト</label>
                            <select id="prompt-select" name="prompt" class="w-full rounded-md border border-dark-300 shadow-sm focus:border-blue-400 focus:ring-blue-400 bg-dark-600 text-dark-50 text-xs">
                                {% for prompt in prompts %}
                                <option value="{{ prompt }}" {{ 'selected' if prompt == default_prompt else '' }}>{{ prompt }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <!-- Result Text -->
                        <div>
                            <div class="flex justify-between items-center">
                                <label for="result-text" class="block text-sm font-medium text-dark-300">解析結果</label>
                                <button id="copy-button" class="px-2 py-1 bg-dark-700 hover:bg-dark-600 rounded text-xs font-medium transition-colors text-dark-300 flex items-center">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-1">
                                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                                    </svg>
                                </button>
                            </div>
                            <textarea
                                id="result-text"
                                rows="15"
                                class="w-full rounded-md border border-dark-300 shadow-sm focus:border-blue-400 focus:ring-blue-400 bg-dark-700 text-dark-50 text-xs p-1"
                                readonly
                            ></textarea>
                            <div class="flex justify-between items-center mt-1">
                                <span id="line-count" class="text-xs text-dark-500">行数: 0</span>

                                <div class="flex justify-start items-center">
                                    <label class="block text-sm font-medium text-dark-300">行数目安</label>
                                    <div class="flex justify-between items-center ml-4" id="planned-lines-container" >
                                        <div class="ml-2">
                                            <input type="radio" id="planned-none" name="planned-lines" value="" checked >
                                            <label for="planned-none" class="hover:bg-dark-600 rounded text-xs font-medium transition-colors text-dark-300 cursor-pointer">指定なし</label>
                                        </div>

                                        {% for line in planned_lines %}
                                        <div class="ml-2">
                                            <input type="radio" id="planned-{{ line }}" name="planned-lines" value="{{ line }}" >
                                            <label for="planned-{{ line }}" class="hover:bg-dark-600 rounded text-xs font-medium transition-colors text-dark-300 cursor-pointer">{{ line }}行</label>
                                        </div>
                                        {% endfor %}
                                    </div>
                                </div>

                                <div class="flex space-x-1">
                                    <button id="reanalyze-button" class="px-2 py-1 bg-blue-600 hover:bg-blue-700 text-white rounded text-xs font-medium transition-colors flex items-center">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-1">
                                            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                                            <path d="M3 3v5h5"></path>
                                            <path d="M21 12a9 9 0 1 1-9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path>
                                            <path d="M21 3v5h-5"></path>
                                        </svg>
                                        再解析
                                    </button>
                                    <button id="clear-button" class="px-2 py-1 bg-red-600 hover:bg-red-700 text-white rounded text-xs font-medium transition-colors flex items-center">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-1">
                                            <polyline points="3 6 5 6 21 6"></polyline>
                                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                        </svg>
                                        クリア
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Image Modal -->
        <div id="image-modal" class="fixed inset-0 bg-black bg-opacity-90 flex items-center justify-center z-50 hidden">
            <div class="relative w-full h-full max-w-none">
                <img id="modal-image" src="" alt="Modal Preview" class="max-w-full max-h-full object-contain absolute inset-0 m-auto">
                <button id="close-modal" class="absolute top-4 right-4 bg-dark-800 rounded-full p-2 shadow-lg hover:bg-dark-700">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-dark-50">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        // Drag and Drop functionality
        const dropArea = document.getElementById('drop-area');
        const fileInput = document.getElementById('file-input');

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(function(eventName) {
            dropArea.addEventListener(eventName, function(e) {
                preventDefaults(e);
            }, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropArea.addEventListener(eventName, highlight, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropArea.addEventListener(eventName, unhighlight, false);
        });

        function highlight() {
            dropArea.classList.add('border-blue-500', 'bg-blue-50');
        }

        function unhighlight() {
            dropArea.classList.remove('border-blue-500', 'bg-blue-50');
        }

        // Handle dropped files
        dropArea.addEventListener('drop', handleDrop, false);

        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            if (files.length > 0) {
                uploadFile(files[0]);
            }
        }

        // Click on the drag area to open file dialog
        dropArea.addEventListener('click', () => {
            fileInput.click();
        });

        // File input change event
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                uploadFile(e.target.files[0]);
            }
        });

        let currentImageFilename = '';

        async function uploadFile(file) {
            try {
                const formData = new FormData();
                formData.append('file', file);

                // Global wait overlay表示
                showGlobalWaitOverlay();

                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (result.filename) {
                    currentImageFilename = result.filename;
                    // 画像プレビューは解析時に表示するため、ここで何もしない
                    analyzeImage(result.filename);
                } else {
                    hideGlobalWaitOverlay();
                    alert('ファイルのアップロードに失敗しました。');
                }
            } catch (error) {
                console.error('Error uploading file:', error);
                hideGlobalWaitOverlay();
                alert('ファイルのアップロード中にエラーが発生しました。');
            }
        }

        async function analyzeImage(filename) {
            const promptSelect = document.getElementById('prompt-select');
            const resultText = document.getElementById('result-text');

            try {
                const prompt = promptSelect.value;

                // Global wait overlay表示
                showGlobalWaitOverlay();

                // 選択された予定行数を取得
                const selectedPlannedLines = document.querySelector('input[name="planned-lines"]:checked');
                const plannedLinesValue = selectedPlannedLines ? selectedPlannedLines.value : '';

                const response = await fetch(`/analyze`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        prompt: prompt,
                        image_path: filename,
                        planned_lines: plannedLinesValue
                    })
                });

                const result = await response.json();

                // 必要な情報を表示
                if (result.response) {
                    resultText.value = result.response;

                    // もし画像データがあればプレビュー表示
                    if (result.image_data && typeof result.image_data === 'string' &&
                        result.image_data.startsWith('data:image/')) {
                        showPreview(result.image_data);
                    }

                    // 解析結果のテキストエリアを一番上までスクロール
                    resultText.scrollTop = 0;

                    // 行数を更新
                    updateLineCount(resultText.value);

                    // 解析結果のテキストエリアを一番上までスクロール
                    resultText.scrollTop = 0;
                } else if (result.error) {
                    resultText.value = `解析エラー: ${result.error}`;
                    resultText.scrollTop = 0;
                    updateLineCount(resultText.value);
                    resultText.scrollTop = 0;
                } else {
                    resultText.value = "解析結果を取得できませんでした。";
                    resultText.scrollTop = 0;
                    updateLineCount(resultText.value);
                    resultText.scrollTop = 0;
                }
            } catch (error) {
                console.error('Error analyzing image:', error);
                resultText.value = `解析中にエラーが発生しました: ${error.message}`;
            } finally {
                // Global wait overlay非表示
                hideGlobalWaitOverlay();
            }
        }

        function showPreview(imageData) {
            const previewContainer = document.getElementById('preview-container');
            const previewImage = document.getElementById('preview-image');
            const noPreviewText = document.getElementById('no-preview-text');

            // Hide text and show image
            noPreviewText.classList.add('hidden');
            previewImage.classList.remove('hidden');
            previewImage.src = imageData; // Base64データを使用

            // Show analysis area
            document.getElementById('analysis-area').classList.remove('hidden');
        }

        // Global wait overlayの表示
        function showGlobalWaitOverlay() {
            const globalWaitOverlay = document.getElementById('global-wait-overlay');
            globalWaitOverlay.classList.remove('hidden');
        }

        // Global wait overlayの非表示
        function hideGlobalWaitOverlay() {
            const globalWaitOverlay = document.getElementById('global-wait-overlay');
            globalWaitOverlay.classList.add('hidden');
        }

        // Copy to clipboard
        document.getElementById('copy-button').addEventListener('click', () => {
            const resultText = document.getElementById('result-text');
            resultText.select();
            document.execCommand('copy');
            alert('コピーされました！');
        });

        // Clear button
        document.getElementById('clear-button').addEventListener('click', () => {
            // Reset UI
            document.getElementById('analysis-area').classList.add('hidden');
            document.getElementById('preview-image').src = '';
            document.getElementById('preview-image').classList.add('hidden');
            document.getElementById('no-preview-text').classList.remove('hidden');
            document.getElementById('result-text').value = '';
            currentImageFilename = '';

            // Reset file input
            fileInput.value = '';

            // 隠していた待機オーバーレイも隠す
            hideGlobalWaitOverlay();
        });

        // Prompt change event
        document.getElementById('prompt-select').addEventListener('change', () => {
            if (currentImageFilename) {
                analyzeImage(currentImageFilename);
            }
        });

        // Re-analyze button
        document.getElementById('reanalyze-button').addEventListener('click', () => {
            if (currentImageFilename) {
                analyzeImage(currentImageFilename);
            }
        });

        // Preview click handler
        document.getElementById('preview-container').addEventListener('click', function() {
            const previewImage = document.getElementById('preview-image');
            if (!previewImage.classList.contains('hidden')) {
                const imageData = previewImage.src;
                showImageModal(imageData);
            }
        });

        // Modal close handlers
        document.getElementById('close-modal').addEventListener('click', hideImageModal);

        // Close modal when clicking outside the image
        document.getElementById('image-modal').addEventListener('click', function(event) {
            if (event.target === this) {
                hideImageModal();
            }
        });

        // Close modal with Escape key
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                hideImageModal();
            }
        });

        // Show image in modal
        function showImageModal(imageSrc) {
            const modal = document.getElementById('image-modal');
            const modalImage = document.getElementById('modal-image');

            modalImage.src = imageSrc;
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden'; // Prevent background scrolling
        }

        // Hide image modal
        function hideImageModal() {
            const modal = document.getElementById('image-modal');
            modal.classList.add('hidden');
            document.body.style.overflow = ''; // Restore scrolling
        }

        // Update line count
        function updateLineCount(text) {
            const lineCountElement = document.getElementById('line-count');
            if (lineCountElement) {
                // 空文字列や改行が含まれない場合は0行とみなす
                const lines = text ? text.split('\n').length : 0;
                lineCountElement.textContent = `行数: ${lines}`;
            }
        }

        // Paste event listener for image upload
        document.addEventListener('paste', (event) => {
            const items = event.clipboardData.items;

            for (let i = 0; i < items.length; i++) {
                // Check if data is an image
                if (items[i].type.indexOf('image') !== -1) {
                    // Get file object (Blob)
                    const blob = items[i].getAsFile();

                    // Upload the blob as a file
                    uploadFile(blob);

                    break; // Only process first image
                }
            }
        });

        console.log("Script initialized");
    </script>

    <div class="absolute bottom-0 right-0 p-2">
        <p class="text-xs text-dark-500">Powered by <a href="https://huggingface.co/unsloth/Qwen3-VL-2B-Instruct" target="_blank" class="underline hover:text-blue-400">unsloth/Qwen3-VL-2B-Instruct</a></p>
    </div>
</body>
</html>
